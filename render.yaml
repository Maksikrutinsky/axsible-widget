services:
  - type: web
    name: axsible-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: static
    name: axsible-dashboard
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
